<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODOLIST</title>
    <link rel="shortcut icon" href="img/todolist.svg" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="header">
        <div class="layoutHeader">
            <div class="left">
                <h1>🌄 TO-DO LIST</h1>
            </div>
            <div class="right">
                <button id="buttonMenu" type="button">
                    <img src="img/more.svg" alt="foto__more" id="more_button" class="more">
                    <ul class="dropDown" id="listDropdown">
                        <li><a href="page/profile.html" style="text-decoration: none; color: white;">PROFILE</a></li>
                        <li>MATRIX</li>
                        <li>TODOLIST</li>
                        <li>KELUAR</li>
                    </ul>
                </button>
            </div>
        </div>
        <main>
            <div class="task">
                <form id="form">
                    <textarea name="task" id="task" class="tastArea" cols="240" rows="1"
                        placeholder="Add task"></textarea>
                    <div class="calender">
                        <input type="date" name="date" id="date" class="input_date">
                    </div>
                    <button id="ButtonPlus" type="submit">
                        <img src="img/plus.svg" alt="plus_svg" class="plus">
                    </button>
                    <select name="select_level" id="option_value" class="selectStyle">
                        <option value="">LEVEL</option>
                        <option id="low">Low</option>
                        <option id="medium">Meidium</option>
                        <option id="hight">Hight</option>
                    </select>
                    <button class="deleteAll" id="deleteAll">DELETE ALL</button>
                </form>
            </div>
            <div class="taskContent">
                <div id="task_content" class="taskOne">
                    <div id="content" class="contenTask">
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="main.js"></script>
</body>

</html>
